<title>Python Trainer — Matura</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Fira+Code:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0d0d12;--card:#14141c;--el:#1c1c28;--el2:#252535;
  --text:#f0f0f5;--text2:#a0a0b5;--muted:#606075;
  --accent:#ffd43b;--accent2:#f5c211;--accent-dim:rgba(255,212,59,.12);
  --green:#22c55e;--red:#ef4444;--blue:#3b82f6;
  --radius:10px;--radius-sm:6px;--radius-pill:50px;
  --font-head:'Cinzel',serif;--font-body:'Outfit',sans-serif;--font-mono:'Fira Code',monospace;
  --sidebar-w:280px;--topbar-h:52px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;line-height:1.5;}
::selection{background:var(--accent);color:var(--bg);}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--el2);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--muted);}

/* ===== TOPBAR ===== */
.topbar{height:var(--topbar-h);background:var(--card);border-bottom:1px solid var(--el2);display:flex;align-items:center;padding:0 16px;gap:12px;position:relative;z-index:100;}
.logo{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.logo-icon{font-size:22px;}
.logo-text{font-family:var(--font-head);font-size:16px;font-weight:600;color:var(--text);letter-spacing:.5px;}
.matura-badge{background:var(--accent);color:var(--bg);font-family:var(--font-body);font-size:9px;font-weight:700;padding:2px 7px;border-radius:var(--radius-pill);letter-spacing:1px;text-transform:uppercase;margin-left:4px;}
.topbar-spacer{flex:1;}
.stat-pill{background:var(--el);padding:4px 12px;border-radius:var(--radius-pill);font-size:12px;color:var(--text2);display:flex;align-items:center;gap:6px;border:1px solid var(--el2);}
.stat-pill .num{color:var(--accent);font-weight:600;}
.pct-pill{background:linear-gradient(135deg,var(--accent-dim),transparent);border:1px solid rgba(255,212,59,.25);padding:4px 12px;border-radius:var(--radius-pill);font-size:12px;color:var(--accent);font-weight:600;}
.topbar-btn{background:var(--el);border:1px solid var(--el2);color:var(--text2);padding:6px 14px;border-radius:var(--radius-pill);font-size:12px;font-family:var(--font-body);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px;}
.topbar-btn:hover{background:var(--el2);color:var(--text);border-color:var(--muted);}
.topbar-btn.danger:hover{border-color:var(--red);color:var(--red);}

/* ===== LAYOUT ===== */
.app-layout{display:flex;height:calc(100vh - var(--topbar-h));}
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--card);border-right:1px solid var(--el2);display:flex;flex-direction:column;overflow:hidden;}
.center-panel{flex:1;overflow-y:auto;padding:20px 28px 40px;}

/* ===== SIDEBAR ===== */
.filter-bar{padding:10px 12px;border-bottom:1px solid var(--el2);display:flex;flex-wrap:wrap;gap:4px;}
.filter-tag{padding:3px 10px;border-radius:var(--radius-pill);font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--el2);background:var(--el);color:var(--text2);transition:all .2s;white-space:nowrap;}
.filter-tag:hover{border-color:var(--muted);color:var(--text);}
.filter-tag.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
.task-list{flex:1;overflow-y:auto;padding:6px 0;}
.task-item{padding:8px 14px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .15s;border-left:3px solid transparent;font-size:12.5px;color:var(--text2);}
.task-item:hover{background:var(--el);}
.task-item.active{background:var(--el);border-left-color:var(--accent);color:var(--text);}
.task-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;border:1.5px solid var(--muted);background:transparent;}
.task-dot.done{background:var(--green);border-color:var(--green);}
.task-dot.repeat{background:var(--red);border-color:var(--red);}
.task-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.task-lvl{font-size:10px;color:var(--muted);flex-shrink:0;}
.sidebar-footer{padding:10px 14px;border-top:1px solid var(--el2);font-size:11px;color:var(--muted);max-height:140px;overflow-y:auto;}
.cat-stat{display:flex;justify-content:space-between;padding:2px 0;}
.cat-stat-name{display:flex;align-items:center;gap:5px;}
.cat-stat-dot{width:6px;height:6px;border-radius:50%;display:inline-block;}

/* ===== PROGRESS BAR ===== */
.progress-wrap{background:var(--el);border-radius:var(--radius);height:6px;margin-bottom:18px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:var(--radius);transition:width .4s ease;}

/* ===== TASK DESCRIPTION ===== */
.task-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
.cat-badge{padding:3px 10px;border-radius:var(--radius-pill);font-size:11px;font-weight:600;color:#fff;text-transform:uppercase;letter-spacing:.5px;}
.diff-badge{padding:3px 10px;border-radius:var(--radius-pill);font-size:11px;font-weight:500;background:var(--el);color:var(--text2);border:1px solid var(--el2);}
.hint-btn{padding:3px 10px;border-radius:var(--radius-pill);font-size:11px;font-weight:500;background:var(--el);color:var(--text2);border:1px solid var(--el2);cursor:pointer;transition:all .2s;}
.hint-btn:hover{border-color:var(--accent);color:var(--accent);}
.task-title{font-family:var(--font-head);font-size:20px;font-weight:600;margin-bottom:6px;color:var(--text);}
.task-desc{background:var(--card);border:1px solid var(--el2);border-radius:var(--radius);padding:14px 18px;font-size:13.5px;color:var(--text2);line-height:1.7;margin-bottom:14px;}
.task-desc code{background:var(--el);padding:1px 6px;border-radius:4px;font-family:var(--font-mono);font-size:12.5px;color:var(--accent);}
.hint-box{background:var(--el);border:1px solid var(--el2);border-radius:var(--radius);padding:10px 14px;margin-bottom:14px;font-size:12.5px;color:var(--text2);display:none;}
.hint-box.show{display:block;}

/* ===== ANSWER PANEL ===== */
.answer-panel{background:var(--card);border:1px solid var(--el2);border-radius:var(--radius);margin-bottom:14px;display:none;overflow:hidden;}
.answer-panel.show{display:block;}
.answer-header{padding:10px 14px;background:var(--el);border-bottom:1px solid var(--el2);font-size:12px;font-weight:600;color:var(--accent);cursor:pointer;display:flex;align-items:center;gap:6px;}
.answer-body{padding:12px 14px;}
.answer-body pre{font-family:var(--font-mono);font-size:12px;color:var(--green);white-space:pre-wrap;word-break:break-all;}
.answer-body .sol-code{margin-top:8px;padding-top:8px;border-top:1px solid var(--el2);color:var(--text2);}

/* ===== VERDICT ===== */
.verdict-bar{padding:10px 14px;border-radius:var(--radius);margin-bottom:14px;font-size:13px;font-weight:500;display:none;align-items:center;gap:8px;}
.verdict-bar.show{display:flex;}
.verdict-bar.correct{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:var(--green);}
.verdict-bar.wrong{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--red);}

/* ===== KEYWORDS BAR ===== */
.kw-bar{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:14px;}
.kw-btn{padding:2px 8px;border-radius:4px;font-size:11px;font-family:var(--font-mono);background:var(--el);border:1px solid var(--el2);color:var(--text2);cursor:pointer;transition:all .15s;}
.kw-btn:hover{background:var(--el2);color:var(--accent);border-color:var(--accent);}
.kw-btn.builtin{color:var(--blue);}
.kw-btn.builtin:hover{color:var(--accent);}

/* ===== CODE EDITOR ===== */
.editor-wrap{position:relative;background:var(--card);border:1px solid var(--el2);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;}
.editor-container{display:flex;min-height:160px;max-height:400px;}
.line-numbers{padding:12px 0;background:var(--el);border-right:1px solid var(--el2);min-width:40px;text-align:right;user-select:none;overflow:hidden;}
.line-numbers span{display:block;padding:0 8px;font-family:var(--font-mono);font-size:13px;line-height:1.5;color:var(--muted);}
.code-area{flex:1;position:relative;overflow:hidden;}
.code-textarea{position:absolute;top:0;left:0;width:100%;height:100%;padding:12px;font-family:var(--font-mono);font-size:13px;line-height:1.5;background:transparent;color:transparent;caret-color:var(--text);border:none;outline:none;resize:none;z-index:2;white-space:pre;overflow:auto;tab-size:4;-moz-tab-size:4;}
.code-highlight{padding:12px;font-family:var(--font-mono);font-size:13px;line-height:1.5;white-space:pre;pointer-events:none;min-height:100%;color:var(--text);overflow:hidden;}

/* Syntax highlighting */
.hl-keyword{color:#569cd6;font-weight:500;}
.hl-builtin{color:#4ec9b0;}
.hl-string{color:#ce9178;}
.hl-number{color:#b5cea8;}
.hl-comment{color:#6a9955;font-style:italic;}
.hl-decorator{color:#c586c0;}
.hl-paren{color:var(--accent);}
.hl-operator{color:#d4d4d4;}

/* ===== ACTION BAR ===== */
.action-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.action-btn{padding:8px 18px;border-radius:var(--radius-pill);font-size:13px;font-weight:600;font-family:var(--font-body);cursor:pointer;border:none;transition:all .2s;display:flex;align-items:center;gap:6px;}
.btn-run{background:linear-gradient(135deg,var(--accent2),var(--accent));color:var(--bg);}
.btn-run:hover{filter:brightness(1.1);transform:translateY(-1px);}
.btn-sol{background:var(--el);border:1px solid var(--el2);color:var(--text2);}
.btn-sol:hover{border-color:var(--accent);color:var(--accent);}
.btn-clear{background:var(--el);border:1px solid var(--el2);color:var(--text2);}
.btn-clear:hover{border-color:var(--muted);color:var(--text);}
.btn-next{background:var(--el);border:1px solid var(--el2);color:var(--text2);}
.btn-next:hover{border-color:var(--green);color:var(--green);}

/* ===== SELF-ASSESS ===== */
.assess-bar{display:none;gap:10px;margin-bottom:14px;align-items:center;}
.assess-bar.show{display:flex;}
.assess-label{font-size:12px;color:var(--muted);}
.assess-btn{padding:8px 22px;border-radius:var(--radius-pill);font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:var(--font-body);transition:all .2s;}
.assess-btn.know{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.4);color:var(--green);}
.assess-btn.know:hover{background:rgba(34,197,94,.25);}
.assess-btn.nope{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.4);color:var(--red);}
.assess-btn.nope:hover{background:rgba(239,68,68,.25);}

/* ===== OUTPUT ===== */
.output-panel{background:var(--card);border:1px solid var(--el2);border-radius:var(--radius);overflow:hidden;}
.output-header{padding:8px 14px;background:var(--el);border-bottom:1px solid var(--el2);font-size:12px;font-weight:600;color:var(--text2);display:flex;align-items:center;gap:6px;}
.output-body{padding:12px 14px;font-family:var(--font-mono);font-size:12.5px;color:var(--text);white-space:pre-wrap;word-break:break-all;min-height:40px;max-height:200px;overflow-y:auto;}
.out-hint{color:var(--muted);font-style:italic;}

/* ===== DAILY PLAN MODAL ===== */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:var(--card);border:1px solid var(--el2);border-radius:var(--radius);padding:24px;max-width:520px;width:90%;max-height:80vh;overflow-y:auto;}
.modal-title{font-family:var(--font-head);font-size:18px;font-weight:600;margin-bottom:16px;color:var(--accent);}
.modal-cat{margin-bottom:12px;}
.modal-cat-title{font-size:13px;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.modal-task{padding:4px 8px;font-size:12px;color:var(--text2);cursor:pointer;border-radius:4px;transition:background .15s;}
.modal-task:hover{background:var(--el);color:var(--text);}
.modal-close{margin-top:16px;padding:8px 20px;border-radius:var(--radius-pill);background:var(--el);border:1px solid var(--el2);color:var(--text2);font-size:13px;cursor:pointer;font-family:var(--font-body);}
.modal-close:hover{border-color:var(--muted);color:var(--text);}

/* ===== RESPONSIVE ===== */
@media(max-width:1100px){
  .sidebar{width:220px;min-width:220px;}
}
@media(max-width:900px){
  .sidebar{display:none;}
  .center-panel{padding:14px 16px 30px;}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">
    <span class="logo-icon">🐍</span>
    <span class="logo-text">Python Trainer</span>
    <span class="matura-badge">MATURA</span>
  </div>
  <div class="topbar-spacer"></div>
  <div class="stat-pill">Ukończone: <span class="num" id="statDone">0</span>/<span id="statTotal">0</span></div>
  <div class="pct-pill" id="statPct">0%</div>
  <button class="topbar-btn" id="btnDzis" onclick="showDailyPlan()">📅 Dziś 0/25</button>
  <button class="topbar-btn" onclick="pickRandom()">🎲 Losowe</button>
  <button class="topbar-btn danger" onclick="resetProgress()">🗑 Reset</button>
</div>

<!-- LAYOUT -->
<div class="app-layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="filter-bar" id="filterBar"></div>
    <div class="task-list" id="taskList"></div>
    <div class="sidebar-footer" id="sidebarFooter"></div>
  </div>

  <!-- CENTER -->
  <div class="center-panel" id="centerPanel">
    <div class="progress-wrap"><div class="progress-fill" id="progressFill"></div></div>

    <!-- Task header -->
    <div class="task-header" id="taskHeader"></div>
    <div class="task-title" id="taskTitle"></div>
    <div class="task-desc" id="taskDesc"></div>
    <div class="hint-box" id="hintBox"></div>

    <!-- Verdict -->
    <div class="verdict-bar" id="verdictBar"></div>

    <!-- Answer panel -->
    <div class="answer-panel" id="answerPanel">
      <div class="answer-header" onclick="toggleAnswerBody()">▶ Rozwiązanie i oczekiwane wyjście</div>
      <div class="answer-body" id="answerBody"></div>
    </div>

    <!-- Self assess -->
    <div class="assess-bar" id="assessBar">
      <span class="assess-label">Oceń siebie:</span>
      <button class="assess-btn know" onclick="selfAssess(true)">✓ Umiem</button>
      <button class="assess-btn nope" onclick="selfAssess(false)">✗ Nie umiem</button>
    </div>

    <!-- Keywords bar -->
    <div class="kw-bar" id="kwBar"></div>

    <!-- Code editor -->
    <div class="editor-wrap">
      <div class="editor-container">
        <div class="line-numbers" id="lineNumbers"></div>
        <div class="code-area">
          <div class="code-highlight" id="codeHighlight"></div>
          <textarea class="code-textarea" id="codeInput" spellcheck="false" autocomplete="off" autocapitalize="off"></textarea>
        </div>
      </div>
    </div>

    <!-- Action bar -->
    <div class="action-bar">
      <button class="action-btn btn-run" onclick="runCode()">▶ Uruchom</button>
      <button class="action-btn btn-sol" onclick="toggleAnswer()">💡 Rozwiązanie</button>
      <button class="action-btn btn-clear" onclick="clearEditor()">🧹 Wyczyść</button>
      <button class="action-btn btn-next" onclick="goNext()">→ Następne</button>
    </div>

    <!-- Output -->
    <div class="output-panel">
      <div class="output-header">📤 Wyjście</div>
      <div class="output-body" id="outContent"><span class="out-hint">// Wyjście programu pojawi się tutaj...</span></div>
    </div>
  </div>
</div>

<!-- DAILY PLAN MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeDailyPlan(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">📅 Plan na dziś</div>
    <div id="modalBody"></div>

let outputBuf = '';
let hasRun = false;
let dailyPlanCache = null;

// ========== PERSISTENCE ==========
function saveDone() { localStorage.setItem('py_done', JSON.stringify([...dn])); }
function saveRepeat() { localStorage.setItem('py_repeat', JSON.stringify([...rp])); }

// ========== SKULPT ==========
function builtinRead(x) {
  if (Sk.builtinFiles === undefined || Sk.builtinFiles["files"][x] === undefined)
    throw "File not found: '" + x + "'";
  return Sk.builtinFiles["files"][x];
}

function runCode() {
  const code = document.getElementById('codeInput').value;
  outputBuf = '';
  const outEl = document.getElementById('outContent');
  outEl.textContent = '';

  Sk.configure({
    output: function(text) {
      outputBuf += text;
      outEl.textContent = outputBuf;
    },
    read: builtinRead,
    __future__: Sk.python3
  });

  Sk.misceval.asyncToPromise(function() {
    return Sk.importMainWithBody("<stdin>", false, code, true);
  }).then(function() {
    hasRun = true;
    checkAnswer();
    showAssessBar();
  }, function(err) {
    hasRun = true;
    outEl.innerHTML = '<span style="color:var(--red);">' + escHtml(err.toString()) + '</span>';
    showAssessBar();
  });
}

function checkAnswer() {
  const task = T[cur];
  if (!task.a) return;
  const expected = task.a.replace(/\\n/g, '\n').trim();
  const got = outputBuf.trim();
  const vb = document.getElementById('verdictBar');
  if (got === expected) {
    vb.className = 'verdict-bar show correct';
    vb.innerHTML = '✓ Poprawna odpowiedź!';
  } else {
    vb.className = 'verdict-bar show wrong';
    vb.innerHTML = '✗ Odpowiedź różni się od oczekiwanej';
  }
}

function showAssessBar() {
  document.getElementById('assessBar').classList.add('show');
}

function selfAssess(know) {
  if (know) {
    dn.add(cur);
    rp.delete(cur);
    markDailyDone(cur);
  } else {
    rp.add(cur);
    dn.delete(cur);
    // Show answer when "nie umiem"
    showAnswerPanel();
  }
  saveDone();
  saveRepeat();
  updateStats();
  updateDailyBadge();
  renderTaskList();
  renderSidebarFooter();
  document.getElementById('assessBar').classList.remove('show');
}

// ========== EDITOR ==========
const codeInput = document.getElementById('codeInput');
const codeHighlight = document.getElementById('codeHighlight');
const lineNumbers = document.getElementById('lineNumbers');

codeInput.addEventListener('input', syncEditor);
codeInput.addEventListener('scroll', syncScroll);
codeInput.addEventListener('keydown', function(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = this.selectionStart, end = this.selectionEnd;
    this.value = this.value.substring(0, s) + '    ' + this.value.substring(end);
    this.selectionStart = this.selectionEnd = s + 4;
    syncEditor();
  }
  if (e.key === 'Enter' && e.ctrlKey) {
    e.preventDefault();
    runCode();
  }
});

function syncEditor() {
  const code = codeInput.value;
  codeHighlight.innerHTML = highlightPython(code);
  updateLineNumbers(code);
}

function syncScroll() {
  codeHighlight.scrollTop = codeInput.scrollTop;
  codeHighlight.scrollLeft = codeInput.scrollLeft;
  lineNumbers.scrollTop = codeInput.scrollTop;
}

function updateLineNumbers(code) {
  const lines = code.split('\n').length;
  let html = '';
  for (let i = 1; i <= Math.max(lines, 8); i++) {
    html += '<span>' + i + '</span>';
  }
  lineNumbers.innerHTML = html;
}

function highlightPython(code) {
  const kwSet = new Set(PY_KEYWORDS);
  const biSet = new Set(PY_BUILTINS);
  // Tokenize approach: scan character by character
  let result = '';
  let i = 0;
  const len = code.length;
  while (i < len) {
    const ch = code[i];
    // Comments
    if (ch === '#') {
      let end = code.indexOf('\n', i);
      if (end === -1) end = len;
      result += '<span class="hl-comment">' + escHtml(code.slice(i, end)) + '</span>';
      i = end;
      continue;
    }
    // Strings
    if (ch === '"' || ch === "'") {
      let triple = code.slice(i, i + 3);
      let delim = '';
      if (triple === '"""' || triple === "'''") { delim = triple; }
      else { delim = ch; }
      let j = i + delim.length;
      while (j < len) {
        if (code[j] === '\\') { j += 2; continue; }
        if (code.slice(j, j + delim.length) === delim) { j += delim.length; break; }
        j++;
      }
      result += '<span class="hl-string">' + escHtml(code.slice(i, j)) + '</span>';
      i = j;
      continue;
    }
    // Decorators
    if (ch === '@' && (i === 0 || code[i-1] === '\n')) {
      let j = i + 1;
      while (j < len && /\w/.test(code[j])) j++;
      result += '<span class="hl-decorator">' + escHtml(code.slice(i, j)) + '</span>';
      i = j;
      continue;
    }
    // Numbers
    if (/\d/.test(ch) && (i === 0 || !/\w/.test(code[i-1]))) {
      let j = i;
      while (j < len && /[\d.]/.test(code[j])) j++;
      result += '<span class="hl-number">' + escHtml(code.slice(i, j)) + '</span>';
      i = j;
      continue;
    }
    // Words (keywords/builtins/identifiers)
    if (/[a-zA-Z_]/.test(ch)) {
      let j = i;
      while (j < len && /\w/.test(code[j])) j++;
      const word = code.slice(i, j);
      if (kwSet.has(word)) {
        result += '<span class="hl-keyword">' + word + '</span>';
      } else if (biSet.has(word)) {
        result += '<span class="hl-builtin">' + word + '</span>';
      } else {
        result += escHtml(word);
      }
      i = j;
      continue;
    }
    // Parentheses
    if ('()[]{}' .includes(ch)) {
      result += '<span class="hl-paren">' + escHtml(ch) + '</span>';
      i++;
      continue;
    }
    // Default
    result += escHtml(ch);
    i++;
  }
  return result + '\n';
}

function clearEditor() {
  const task = T[cur];
  codeInput.value = task.starter || '';
  syncEditor();
}

function insertKeyword(kw) {
  const ta = codeInput;
  const s = ta.selectionStart;
  ta.value = ta.value.substring(0, s) + kw + ta.value.substring(ta.selectionEnd);
  ta.selectionStart = ta.selectionEnd = s + kw.length;
  ta.focus();
  syncEditor();
}

// ========== NAVIGATION ==========
function selectTask(idx) {
  cur = idx;
  hasRun = false;
  renderTask();
  renderTaskList();
}

function goNext() {
  const visible = getVisibleTasks();
  if (visible.length === 0) return;
  const curIdx = visible.indexOf(cur);
  if (curIdx < visible.length - 1) {
    selectTask(visible[curIdx + 1]);
  } else {
    selectTask(visible[0]);
  }
}

function pickRandom() {
  const visible = getVisibleTasks().filter(i => !dn.has(i));
  if (visible.length === 0) {
    const all = getVisibleTasks();
    if (all.length > 0) selectTask(all[Math.floor(Math.random() * all.length)]);
    return;
  }
  selectTask(visible[Math.floor(Math.random() * visible.length)]);
}

function getVisibleTasks() {
  if (curFilter === 'all') return T.map((_, i) => i);
  if (curFilter === 'today') return getDailyPlan();
  if (curFilter === 'repeat') return T.map((_, i) => i).filter(i => rp.has(i));
  return T.map((_, i) => i).filter(i => T[i].c === curFilter);
}

// ========== DAILY PLAN (deterministic, 25 tasks/day) ==========
const DAILY_PER_CAT = [4,4,4,4,4,5]; // 4+4+4+4+4+5 = 25
const DAILY_PLAN_KEY = 'py_daily_v2';
let dailyDone = new Set();

function seededShuffle(arr, seed) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    seed = (seed * 1664525 + 1013904223) & 0x7fffffff;
    const j = seed % (i + 1);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function dateSeed(dateStr) {
  return dateStr.split('-').reduce((a, b) => a * 100 + parseInt(b), 0);
}

function buildDailyPlan(dateStr) {
  const seed = dateSeed(dateStr);
  const plan = [];
  CATS.forEach((cat, ci) => {
    const catIdxs = T.map((_, i) => i).filter(i => T[i].c === cat);
    const shuffled = seededShuffle(catIdxs, seed + ci * 997);
    plan.push(...shuffled.slice(0, DAILY_PER_CAT[ci]));
  });
  return seededShuffle(plan, seed + 12345);
}

function getDailyPlan() {
  const today = new Date().toISOString().slice(0, 10);
  if (dailyPlanCache && dailyPlanCache.date === today) return dailyPlanCache.plan;
  let stored = null;
  try { stored = JSON.parse(localStorage.getItem(DAILY_PLAN_KEY)); } catch(e) {}
  if (stored && stored.date === today) {
    dailyDone = new Set(stored.done || []);
    dailyPlanCache = { date: today, plan: stored.plan };
    return stored.plan;
  }
  const plan = buildDailyPlan(today);
  dailyDone = new Set();
  dailyPlanCache = { date: today, plan: plan };
  saveDailyPlan();
  return plan;
}

function saveDailyPlan() {
  if (!dailyPlanCache) return;
  const obj = { date: dailyPlanCache.date, plan: dailyPlanCache.plan, done: [...dailyDone] };
  try { localStorage.setItem(DAILY_PLAN_KEY, JSON.stringify(obj)); } catch(e) {}
}

function markDailyDone(taskIdx) {
  if (!dailyPlanCache) return;
  if (dailyPlanCache.plan.includes(taskIdx)) {
    dailyDone.add(taskIdx);
    saveDailyPlan();
    updateDailyBadge();
  }
}

function updateDailyBadge() {
  const plan = dailyPlanCache ? dailyPlanCache.plan : getDailyPlan();
  const done = plan.filter(i => dailyDone.has(i) || dn.has(i)).length;
  const btn = document.getElementById('btnDzis');
  if (btn) btn.textContent = '📅 Dziś ' + done + '/25';
  // Also update the Dziś filter tag
  const fTag = document.querySelector('[data-filter="today"]');
  if (fTag) fTag.textContent = 'Dziś ' + done + '/25';
}

function showDailyPlan() {
  const plan = getDailyPlan();
  const body = document.getElementById('modalBody');
  let html = '';
  const byCat = {};
  CATS.forEach(c => byCat[c] = []);
  plan.forEach(i => { if (T[i]) byCat[T[i].c].push(i); });

  CATS.forEach(cat => {
    const items = byCat[cat];
    if (!items || items.length === 0) return;
    const catDone = items.filter(i => dailyDone.has(i) || dn.has(i)).length;
    html += '<div class="modal-cat">';
    html += '<div class="modal-cat-title"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + (CAT_COLORS[cat]||'#666') + '"></span> ' + (CAT_LABELS[cat]||cat) + ' <span style="font-size:.65rem;color:var(--muted)">' + catDone + '/' + items.length + '</span></div>';
    for (const idx of items) {
      const t = T[idx];
      const isDone = dailyDone.has(idx) || dn.has(idx);
      const style = isDone ? 'style="text-decoration:line-through;color:var(--muted)"' : '';
      html += '<div class="modal-task" ' + style + ' onclick="selectTask(' + idx + ');closeDailyPlan()">' + (isDone ? '✓ ' : '○ ') + t.n + '</div>';
    }
    html += '</div>';
  });

  const totalDone = plan.filter(i => dailyDone.has(i) || dn.has(i)).length;
  const pct = Math.round(totalDone / plan.length * 100);
  const summary = '<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:.65rem;color:var(--muted);margin-bottom:4px"><span>Postęp dnia: ' + totalDone + '/25 (' + pct + '%)</span><span>Ogółem: ' + dn.size + '/' + T.length + '</span></div><div style="height:6px;background:var(--el);border-radius:3px;overflow:hidden"><div style="height:100%;background:linear-gradient(90deg,#f59e0b,#ef4444);border-radius:3px;width:' + pct + '%;transition:width .3s"></div></div></div>';
  const startBtn = '<div style="margin-top:10px;text-align:center"><button onclick="startFirstUndone()" style="padding:8px 20px;background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.4);border-radius:8px;color:#f59e0b;font-size:.75rem;font-weight:600;cursor:pointer">▶ Zacznij od pierwszego niezaliczonego</button></div>';

  body.innerHTML = summary + html + startBtn;
  document.getElementById('modalOverlay').classList.add('show');
}

function startFirstUndone() {
  const plan = getDailyPlan();
  const first = plan.find(i => !dailyDone.has(i) && !dn.has(i));
  if (first !== undefined) selectTask(first);
  closeDailyPlan();
}

function closeDailyPlan(e) {
  if (e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('show');
}

// ========== FILTERS ==========
function setFilter(f) {
  curFilter = f;
  renderFilters();
  renderTaskList();
  const visible = getVisibleTasks();
  if (visible.length > 0 && !visible.includes(cur)) {
    selectTask(visible[0]);
  }
}

// ========== RESET ==========
function resetProgress() {
  if (!confirm('Na pewno chcesz zresetowa\u0107 ca\u0142y post\u0119p?')) return;
  dn.clear();
  rp.clear();
  dailyDone.clear();
  dailyPlanCache = null;
  saveDone();
  saveRepeat();
  // Clear daily plans
  try { localStorage.removeItem(DAILY_PLAN_KEY); } catch(e) {}
  for (let i = localStorage.length - 1; i >= 0; i--) {
    const k = localStorage.key(i);
    if (k && k.startsWith('py_daily_')) localStorage.removeItem(k);
  }
  getDailyPlan();
  updateStats();
  updateDailyBadge();
  renderFilters();
  renderTaskList();
  renderSidebarFooter();
  renderTask();
}

// ========== RENDERING ==========
function renderFilters() {
  const bar = document.getElementById('filterBar');
  bar.innerHTML = FILTER_TABS.map(f => {
    let label = f.label;
    if (f.id === 'today') {
      const plan = getDailyPlan();
      const done = plan.filter(i => dailyDone.has(i) || dn.has(i)).length;
      label = 'Dzi\u015b ' + done + '/25';
    }
    if (f.id === 'repeat') {
      label = 'Powt\u00f3rka (' + rp.size + ')';
    }
    return '<span class="filter-tag' + (curFilter === f.id ? ' active' : '') + '" data-filter="' + f.id + '" onclick="setFilter(\'' + f.id + '\')">' + label + '</span>';
  }).join('');
}

function renderTaskList() {
  const list = document.getElementById('taskList');
  const visible = getVisibleTasks();
  list.innerHTML = visible.map(i => {
    const t = T[i];
    let dotClass = 'task-dot';
    if (dn.has(i)) dotClass += ' done';
    else if (rp.has(i)) dotClass += ' repeat';
    const active = i === cur ? ' active' : '';
    return '<div class="task-item' + active + '" onclick="selectTask(' + i + ')">' +
      '<span class="' + dotClass + '"></span>' +
      '<span class="task-name">' + escHtml(t.n) + '</span>' +
      '<span class="task-lvl">' + '★'.repeat(t.lvl) + '</span></div>';
  }).join('');
}

function renderTask() {
  const task = T[cur];

  // Header: category badge, difficulty, hint button
  const hdr = document.getElementById('taskHeader');
  hdr.innerHTML = '<span class="cat-badge" style="background:' + (CAT_COLORS[task.c] || '#666') + '">' + (CAT_LABELS[task.c] || task.c) + '</span>' +
    '<span class="diff-badge">' + (DIFF_LABELS[task.lvl] || '') + ' ' + '★'.repeat(task.lvl) + '</span>' +
    (task.hint ? '<span class="hint-btn" onclick="toggleHint()">💡 Podpowiedź</span>' : '');

  document.getElementById('taskTitle').textContent = task.n;
  document.getElementById('taskDesc').innerHTML = task.d;
  document.getElementById('hintBox').innerHTML = task.hint ? escHtml(task.hint).replace(/\\n/g, '<br>') : '';
  document.getElementById('hintBox').classList.remove('show');

  // Reset answer panel
  document.getElementById('answerPanel').classList.remove('show');
  // Reset verdict
  document.getElementById('verdictBar').className = 'verdict-bar';
  document.getElementById('verdictBar').innerHTML = '';
  // Reset assess
  document.getElementById('assessBar').classList.remove('show');

  // Editor
  codeInput.value = task.starter || '';
  syncEditor();

  // Clear output
  document.getElementById('outContent').innerHTML = '<span class="out-hint">// Wyjście programu pojawi się tutaj...</span>';

  // Scroll to top
  document.getElementById('centerPanel').scrollTop = 0;
}

function renderSidebarFooter() {
  const footer = document.getElementById('sidebarFooter');
  let html = '';
  for (const cat of CATS) {
    const total = T.filter(t => t.c === cat).length;
    const done = T.map((t, i) => i).filter(i => T[i].c === cat && dn.has(i)).length;
    html += '<div class="cat-stat"><span class="cat-stat-name"><span class="cat-stat-dot" style="background:' + CAT_COLORS[cat] + '"></span>' + CAT_LABELS[cat] + '</span><span>' + done + '/' + total + '</span></div>';
  }
  footer.innerHTML = html;
}

function renderKeywordsBar() {
  const bar = document.getElementById('kwBar');
  let html = '';
  for (const kw of PY_KEYWORDS) {
    html += '<span class="kw-btn" onclick="insertKeyword(\'' + kw + ' \')">' + kw + '</span>';
  }
  for (const bi of PY_BUILTINS) {
    html += '<span class="kw-btn builtin" onclick="insertKeyword(\'' + bi + '(\')">' + bi + '</span>';
  }
  bar.innerHTML = html;
}

function updateStats() {
  document.getElementById('statDone').textContent = dn.size;
  document.getElementById('statTotal').textContent = T.length;
  const rawPct = T.length > 0 ? (dn.size / T.length * 100) : 0;
  const pct = Math.round(rawPct);
  const pctText = (dn.size > 0 && pct === 0) ? '<1%' : pct + '%';
  document.getElementById('statPct').textContent = pctText;
  document.getElementById('progressFill').style.width = Math.max(rawPct, dn.size > 0 ? 0.5 : 0) + '%';
}

// ========== UTILS ==========
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ========== INIT ==========
function init() {
  getDailyPlan(); // Initialize daily plan on startup
  renderFilters();
  renderKeywordsBar();
  renderTaskList();
  renderSidebarFooter();
  updateStats();
  updateDailyBadge();
  selectTask(0);
}
init();
</script>
