<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d0d12">
<title>Excel Trainer — Matura</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Outfit:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0d0d12;--card:#14141c;--el:#1c1c28;--el2:#252535;
--text:#f0f0f5;--text2:#a0a0b5;--muted:#606075;
--border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.1);
--green:#22c55e;--red:#dc2626;--orange:#f97316;--gold:#eab308;
--purple:#a855f7;--blue:#3b82f6;--cyan:#06b6d4;--pink:#ec4899;
--xl-if:#3b82f6;--xl-lookup:#a855f7;--xl-math:#22c55e;
--xl-text:#f97316;--xl-date:#06b6d4;--xl-stat:#eab308;
--xl-logic:#ec4899;--xl-cond:#ef4444;--xl-array:#c084fc;--xl-misc:#94a3b8;
}
html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;overflow:hidden;height:100vh}
code{font-family:'Fira Code',monospace;background:var(--el);padding:2px 8px;border-radius:6px;font-size:.85em;color:var(--cyan)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--el);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}
button{cursor:pointer;font-family:inherit}

/* ── LAYOUT ── */
.app{display:grid;grid-template-rows:52px 1fr;height:100vh}
.nav{display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:rgba(13,13,18,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:10px;font-family:'Cinzel',serif;font-size:1.1rem;font-weight:700}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,#22c55e,#3b82f6);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:900}
.t-badge{font-family:'Outfit';font-size:.7rem;padding:3px 10px;background:rgba(34,197,94,.15);color:var(--green);border-radius:50px;margin-left:8px}
.nav-r{display:flex;align-items:center;gap:10px}
.nav-pill{padding:6px 14px;background:var(--el);border:1px solid var(--border);border-radius:50px;font-size:.8rem;color:var(--text2)}
.nav-pill b{color:var(--green)}
.nbtn{padding:6px 14px;background:var(--el);border:1px solid var(--border);border-radius:50px;font-size:.8rem;color:var(--text2);transition:.3s}
.nbtn:hover{border-color:var(--green);color:var(--text)}

.main{display:flex;flex-direction:row;height:calc(100vh - 52px);overflow:hidden}

/* ── SIDEBAR ── */
.side{display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden;background:var(--card);width:280px;flex-shrink:0}
.side-top{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;gap:4px;flex-wrap:wrap}
.ftag{padding:4px 10px;font-size:.7rem;font-weight:600;border:1px solid var(--border);border-radius:50px;background:none;color:var(--muted);transition:.2s;text-transform:uppercase;letter-spacing:.3px}
.ftag:hover,.ftag.on{background:var(--el);color:var(--green);border-color:rgba(34,197,94,.3)}
.tlist{overflow-y:auto;flex:1}
.ti{padding:8px 14px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:.15s;border-left:3px solid transparent}
.ti:hover{background:var(--el)}
.ti.on{background:var(--el);border-left-color:var(--green)}
.ti.done .dot{background:var(--green)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--el2);flex-shrink:0}
.ti-n{font-size:.8rem;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ti-c{font-size:.6rem;color:var(--muted);padding:2px 6px;background:var(--el2);border-radius:4px;font-family:'Fira Code'}
.ti.on .ti-n{color:var(--green);font-weight:600}
.lvl{font-size:.5rem;font-weight:700;padding:1px 4px;border-radius:3px;flex-shrink:0;letter-spacing:.3px;text-transform:uppercase}
.lvl-e{background:rgba(34,197,94,.15);color:#4ade80;border:1px solid rgba(34,197,94,.3)}
.lvl-m{background:rgba(234,179,8,.15);color:#facc15;border:1px solid rgba(234,179,8,.3)}
.lvl-h{background:rgba(249,115,22,.15);color:#fb923c;border:1px solid rgba(249,115,22,.3)}
.lvl-a{background:rgba(168,85,247,.15);color:#c084fc;border:1px solid rgba(168,85,247,.3)}
.repeat-badge{display:inline-block;background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.3);border-radius:3px;font-size:.55rem;padding:1px 5px;margin-left:4px;vertical-align:middle}
.ti.repeat .dot{background:#ef4444!important;box-shadow:0 0 4px #ef4444}

/* ── CENTER ── */
.center{display:flex;flex-direction:column;overflow:hidden;flex:1;min-width:0}

/* Task header */
.task-q{padding:14px 20px;background:var(--card);border-bottom:1px solid var(--border)}
.task-q h2{font-family:'Cinzel',serif;font-size:1rem;margin-bottom:4px}
.task-q h2 span{color:var(--green)}
.task-q p{font-size:.88rem;color:var(--text2);line-height:1.5}

/* Formula input */
.formula-bar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:#1a1f2e;border-bottom:1px solid var(--border)}
.fx-label{font-family:'Fira Code';font-size:.75rem;font-weight:700;color:var(--green);background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);border-radius:4px;padding:2px 8px;flex-shrink:0}
.cell-ref{font-family:'Fira Code';font-size:.75rem;color:var(--gold);background:var(--el);border:1px solid var(--border);border-radius:4px;padding:3px 8px;width:52px;text-align:center;flex-shrink:0}
.formula-input{flex:1;background:transparent;border:none;outline:none;font-family:'Fira Code';font-size:.82rem;color:var(--text);caret-color:var(--green)}
.formula-input::placeholder{color:var(--muted)}

/* Spreadsheet grid */
.sheet-wrap{flex:1;overflow:auto;background:#0f0f18}
.sheet{border-collapse:collapse;font-family:'Fira Code';font-size:.72rem;min-width:100%}
.sheet .col-hdr{background:#111320;color:var(--muted);text-align:center;padding:3px 8px;border:1px solid rgba(255,255,255,.05);font-size:.65rem;font-weight:700;letter-spacing:.5px;position:sticky;top:0;z-index:2;user-select:none}
.sheet .row-hdr{background:#111320;color:var(--muted);text-align:right;padding:3px 8px;border:1px solid rgba(255,255,255,.05);font-size:.65rem;position:sticky;left:0;z-index:1;user-select:none;min-width:28px}
.sheet td.cell{padding:3px 8px;border:1px solid rgba(255,255,255,.04);color:var(--text);text-align:left;min-width:90px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px;cursor:cell;transition:.1s}
.sheet td.cell:hover{background:rgba(34,197,94,.04)}
.sheet td.cell.sel{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.4)!important;outline:2px solid rgba(34,197,94,.5);outline-offset:-1px}
.sheet td.cell.header-cell{background:rgba(59,130,246,.08);color:var(--cyan);font-weight:600}
.sheet td.cell.num{text-align:right;color:#b5cea8}
.sheet td.cell.computed{color:#c084fc}
.sheet td.cell.answer-cell{background:rgba(168,85,247,.07);border-color:rgba(168,85,247,.3)!important}
.sheet td.cell.correct{background:rgba(34,197,94,.15)!important;border-color:rgba(34,197,94,.5)!important;color:#4ade80!important}
.sheet td.cell.wrong{background:rgba(239,68,68,.1)!important;border-color:rgba(239,68,68,.4)!important;color:#f87171!important;animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

/* Action bar */
.actbar{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:var(--card);border-top:1px solid var(--border)}
.actbar-l{display:flex;gap:6px}
.abtn{padding:6px 16px;border-radius:50px;font-size:.8rem;font-weight:600;border:none;transition:.3s}
.abtn-run{background:linear-gradient(135deg,var(--green),#16a34a);color:#000}
.abtn-run:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(34,197,94,.25)}
.abtn-ans{background:var(--el);color:var(--text2);border:1px solid var(--border)}
.abtn-ans:hover{border-color:var(--purple);color:var(--purple)}
.abtn-clr{background:var(--el);color:var(--text2);border:1px solid var(--border)}
.abtn-clr:hover{border-color:var(--red);color:var(--red)}
.abtn-know{background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;border:none;display:none;align-items:center;gap:4px}
.abtn-know:hover{filter:brightness(1.1)}
.abtn-know.show{display:inline-flex}
.abtn-nope{background:linear-gradient(135deg,#dc2626,#b91c1c);color:#fff;border:none;display:none;align-items:center;gap:4px}
.abtn-nope:hover{filter:brightness(1.1)}
.abtn-nope.show{display:inline-flex}

/* Answer + Explanation */
.ans-wrap{display:none;padding:8px 14px;background:rgba(34,197,94,.05);border-top:1px solid rgba(34,197,94,.1)}
.ans-wrap.show{display:block}
.ans-lbl{font-size:.6rem;color:var(--green);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.ans-code{font-family:'Fira Code';font-size:.78rem;color:#55efc4;line-height:1.6;white-space:pre-wrap}
.expl-box{padding:8px 14px;background:rgba(59,130,246,.05);border-top:1px solid rgba(59,130,246,.1);font-size:.78rem;color:var(--text2);line-height:1.5;display:none}
.expl-box b{color:var(--blue);font-size:.6rem;text-transform:uppercase;letter-spacing:.5px}

/* Right panel — formula reference */
.ref-panel{width:240px;flex-shrink:0;border-left:1px solid var(--border);background:var(--card);display:flex;flex-direction:column;overflow:hidden}
.ref-hdr{padding:8px 12px;border-bottom:1px solid var(--border);font-size:.7rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.4px}
.ref-search{padding:6px 10px;border-bottom:1px solid var(--border)}
.ref-search input{width:100%;background:var(--el);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:.72rem;color:var(--text);font-family:inherit;outline:none}
.ref-search input:focus{border-color:var(--green)}
.ref-list{overflow-y:auto;flex:1;padding:6px}
.ref-item{padding:5px 8px;border-radius:5px;margin-bottom:2px;cursor:pointer;transition:.15s}
.ref-item:hover{background:var(--el)}
.ref-fn{font-family:'Fira Code';font-size:.72rem;font-weight:600}
.ref-desc{font-size:.6rem;color:var(--muted);margin-top:1px}

/* Formula color categories */
.c-if{color:var(--xl-if)}
.c-lookup{color:var(--xl-lookup)}
.c-math{color:var(--xl-math)}
.c-text{color:var(--xl-text)}
.c-date{color:var(--xl-date)}
.c-stat{color:var(--xl-stat)}
.c-logic{color:var(--xl-logic)}
.c-cond{color:var(--xl-cond)}
.c-array{color:var(--xl-array)}
.c-misc{color:var(--xl-misc)}

/* Formula buttons bar */
.fmlbar{display:flex;flex-wrap:wrap;gap:3px;padding:5px 10px;background:var(--card);border-bottom:1px solid var(--border)}
.fmlb{padding:2px 8px;font-size:.65rem;font-family:'Fira Code';font-weight:600;border:1px solid transparent;border-radius:4px;background:rgba(255,255,255,.04);transition:.15s;opacity:.88}
.fmlb:hover{opacity:1;transform:translateY(-1px);filter:brightness(1.15)}
.fmlb.c-if{color:var(--xl-if);border-color:rgba(59,130,246,.25);background:rgba(59,130,246,.08)}
.fmlb.c-lookup{color:var(--xl-lookup);border-color:rgba(168,85,247,.25);background:rgba(168,85,247,.08)}
.fmlb.c-math{color:var(--xl-math);border-color:rgba(34,197,94,.25);background:rgba(34,197,94,.08)}
.fmlb.c-text{color:var(--xl-text);border-color:rgba(249,115,22,.25);background:rgba(249,115,22,.08)}
.fmlb.c-date{color:var(--xl-date);border-color:rgba(6,182,212,.25);background:rgba(6,182,212,.08)}
.fmlb.c-stat{color:var(--xl-stat);border-color:rgba(234,179,8,.25);background:rgba(234,179,8,.08)}
.fmlb.c-logic{color:var(--xl-logic);border-color:rgba(236,72,153,.25);background:rgba(236,72,153,.08)}
.fmlb.c-cond{color:var(--xl-cond);border-color:rgba(239,68,68,.25);background:rgba(239,68,68,.08)}
.fmlb.c-array{color:var(--xl-array);border-color:rgba(192,132,252,.25);background:rgba(192,132,252,.08)}

/* Result toast */
.result-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 22px;border-radius:10px;font-size:.82rem;font-weight:600;z-index:500;transition:opacity .5s;pointer-events:none;opacity:0}
.result-toast.show{opacity:1}

/* Feedback badge */
#taskFeedback{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:8px 20px;border-radius:8px;font-size:.75rem;font-weight:600;z-index:500;transition:opacity .4s;pointer-events:none;opacity:0}
</style>
</head>
<body>
<div class="app">

<!-- NAV -->
<nav class="nav">
  <div class="logo">
    <div class="logo-icon">📊</div>
    Excel Trainer
    <span class="t-badge">MATURA</span>
  </div>
  <div class="nav-r">
    <div class="nav-pill"><b id="cDone">0</b> / <span id="cAll">0</span> zad.</div>
    <button class="nbtn" onclick="showDailyModal()" id="btnDzisPlan">📅 Dziś</button>
    <button class="nbtn" onclick="clearProgress()">🗑 Reset</button>
  </div>
</nav>

<!-- MAIN -->
<div class="main" id="main">

  <!-- SIDEBAR -->
  <div class="side">
    <div class="side-top" id="filterBar"></div>
    <div class="tlist" id="tlist"></div>
  </div>

  <!-- CENTER -->
  <div class="center">

    <!-- Task description -->
    <div class="task-q" id="tq">
      <h2>Wybierz <span>zadanie</span></h2>
      <p>Kliknij zadanie po lewej, aby zacząć ćwiczenie z Excelem.</p>
    </div>

    <!-- Formula quick-insert buttons -->
    <div class="fmlbar" id="fmlBar"></div>

    <!-- Formula bar (like Excel's) -->
    <div class="formula-bar">
      <span class="fx-label">fx</span>
      <span class="cell-ref" id="cellRef">B1</span>
      <input type="text" class="formula-input" id="formulaInput" placeholder="Wpisz formułę, np. =JEŻELI(A2>50;&quot;Tak&quot;;&quot;Nie&quot;)" autocomplete="off" spellcheck="false"/>
    </div>

    <!-- Spreadsheet -->
    <div class="sheet-wrap" id="sheetWrap">
      <table class="sheet" id="sheet"></table>
    </div>

    <!-- Answer / Explanation -->
    <div class="ans-wrap" id="abox">
      <div class="ans-lbl">✓ Wzorcowa odpowiedź</div>
      <div class="ans-code" id="atxt"></div>
    </div>
    <div class="expl-box" id="ebox">
      <b>📚 Wyjaśnienie</b><br>
      <span id="etxt"></span>
    </div>

    <!-- Action bar -->
    <div class="actbar">
      <div class="actbar-l">
        <button class="abtn abtn-run" onclick="checkAnswer()">▶ Sprawdź (Ctrl+Enter)</button>
        <button class="abtn abtn-clr" onclick="clearFormula()">✕ Wyczyść</button>
        <button class="abtn abtn-ans" onclick="toggleAns()">👁 Pokaż odpowiedź</button>
      </div>
      <div style="display:flex;gap:6px">
        <button class="abtn abtn-know" id="btnKnow" onclick="markKnow()">✓ Umiem</button>
        <button class="abtn abtn-nope" id="btnNope" onclick="markNope()">✗ Nie umiem</button>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL — formula reference -->
  <div class="ref-panel">
    <div class="ref-hdr">📖 Funkcje Excela</div>
    <div class="ref-search"><input type="text" id="refSearch" placeholder="Szukaj funkcji…" oninput="filterRef(this.value)"></div>
    <div class="ref-list" id="refList"></div>
  </div>

</div><!-- /.main -->
</div><!-- /.app -->

<div id="taskFeedback"></div>

<script>
// ─────────────────────────────────────────────────────────────────
// FORMULA REFERENCE
// ─────────────────────────────────────────────────────────────────
const FML_REF = [
  {fn:'JEŻELI',cat:'if',desc:'Zwraca wartość zależnie od warunku'},
  {fn:'JEŻELI.BŁĄD',cat:'if',desc:'Zwraca wartość alternatywną przy błędzie'},
  {fn:'JEŻELI.ND',cat:'if',desc:'Zwraca wartość gdy wynik to #N/D'},
  {fn:'ORAZ',cat:'logic',desc:'Zwraca PRAWDA gdy wszystkie warunki spełnione'},
  {fn:'LUB',cat:'logic',desc:'Zwraca PRAWDA gdy chociaż jeden warunek spełniony'},
  {fn:'NIE',cat:'logic',desc:'Odwraca wartość logiczną'},
  {fn:'LICZ.JEŻELI',cat:'cond',desc:'Zlicza komórki spełniające kryterium'},
  {fn:'LICZ.WARUNKI',cat:'cond',desc:'Zlicza komórki spełniające wiele kryteriów'},
  {fn:'SUMA.JEŻELI',cat:'cond',desc:'Sumuje komórki spełniające kryterium'},
  {fn:'SUMA.WARUNKÓW',cat:'cond',desc:'Sumuje komórki spełniające wiele kryteriów'},
  {fn:'ŚREDNIA.JEŻELI',cat:'cond',desc:'Średnia komórek spełniających kryterium'},
  {fn:'WYSZUKAJ.PIONOWO',cat:'lookup',desc:'Szuka wartości w kolumnie tabeli'},
  {fn:'WYSZUKAJ.POZIOMO',cat:'lookup',desc:'Szuka wartości w wierszu tabeli'},
  {fn:'INDEKS',cat:'lookup',desc:'Zwraca wartość z podanej pozycji zakresu'},
  {fn:'PODAJ.POZYCJĘ',cat:'lookup',desc:'Zwraca numer pozycji szukanej wartości'},
  {fn:'WYBIERZ',cat:'lookup',desc:'Zwraca wartość z listy na podstawie indeksu'},
  {fn:'SUMA',cat:'math',desc:'Sumuje zakres liczb'},
  {fn:'ILOCZYN',cat:'math',desc:'Mnoży zakres liczb'},
  {fn:'ZAOKR',cat:'math',desc:'Zaokrągla liczbę do podanej precyzji'},
  {fn:'ZAOKR.DO.CAŁK',cat:'math',desc:'Zaokrągla w dół do całkowitej'},
  {fn:'MOD',cat:'math',desc:'Zwraca resztę z dzielenia'},
  {fn:'POTĘGA',cat:'math',desc:'Podnosi liczbę do potęgi'},

  {fn:'BEZWZGL',cat:'math',desc:'Wartość bezwzględna'},

  {fn:'ILE.NIEPUSTYCH',cat:'stat',desc:'Zlicza niepuste komórki'},
  {fn:'LICZ.PUSTE',cat:'stat',desc:'Zlicza puste komórki'},
  {fn:'MAX',cat:'stat',desc:'Zwraca wartość maksymalną'},
  {fn:'MIN',cat:'stat',desc:'Zwraca wartość minimalną'},
  {fn:'ŚREDNIA',cat:'stat',desc:'Oblicza średnią arytmetyczną'},
  {fn:'MEDIANA',cat:'stat',desc:'Oblicza medianę zbioru'},
  {fn:'POZYCJA',cat:'stat',desc:'Zwraca pozycję wartości w zbiorze'},
  {fn:'TEKST',cat:'text',desc:'Formatuje liczbę jako tekst'},
  {fn:'ZŁĄCZ.TEKST',cat:'text',desc:'Łączy wiele tekstów'},
  {fn:'LEWY',cat:'text',desc:'Zwraca lewą część tekstu'},
  {fn:'PRAWY',cat:'text',desc:'Zwraca prawą część tekstu'},
  {fn:'FRAGMENT.TEKSTU',cat:'text',desc:'Wyodrębnia fragment tekstu'},
  {fn:'DŁ',cat:'text',desc:'Zwraca długość tekstu'},
  {fn:'LITERY.WIELKIE',cat:'text',desc:'Zamienia na wielkie litery'},
  {fn:'LITERY.MAŁE',cat:'text',desc:'Zamienia na małe litery'},
  {fn:'USUŃ.ZBĘDNE.ODSTĘPY',cat:'text',desc:'Usuwa nadmiarowe spacje'},
  {fn:'ZNAJDŹ',cat:'text',desc:'Szuka tekstu, rozróżnia wielkość liter'},
  {fn:'SZUKAJ.TEKST',cat:'text',desc:'Szuka tekstu, ignoruje wielkość liter'},
  {fn:'PODSTAW',cat:'text',desc:'Zastępuje fragment tekstu nowym'},

  {fn:'TERAZ',cat:'date',desc:'Zwraca aktualną datę i godzinę'},
  {fn:'ROK',cat:'date',desc:'Zwraca rok z daty'},
  {fn:'MIESIĄC',cat:'date',desc:'Zwraca miesiąc z daty'},
  {fn:'DZIEŃ',cat:'date',desc:'Zwraca dzień z daty'},
  {fn:'DATA',cat:'date',desc:'Tworzy datę z rok/miesiąc/dzień'},
  {fn:'DNI.ROBOCZE',cat:'date',desc:'Oblicza liczbę dni roboczych'},
  {fn:'MACIERZ.JEŻELI',cat:'array',desc:'Warunkowe tablice (nowe Excele)'},
  {fn:'UNIKATOWE',cat:'array',desc:'Zwraca unikalne wartości'},
  {fn:'SORTUJ',cat:'array',desc:'Sortuje zakres/tablicę'},
  {fn:'FILTRUJ',cat:'array',desc:'Filtruje zakres na podstawie kryterium'},
];

function buildRef(){
  renderRef('');
}

function renderRef(q){
  const list=document.getElementById('refList');
  const fq=q.toLowerCase();
  list.innerHTML='';
  FML_REF.filter(f=>!fq||f.fn.toLowerCase().includes(fq)||f.desc.toLowerCase().includes(fq)).forEach(f=>{
    const d=document.createElement('div');
    d.className='ref-item';
    d.innerHTML=`<div class="ref-fn c-${f.cat}">${f.fn}</div><div class="ref-desc">${f.desc}</div>`;
    d.onclick=()=>insertFn(f.fn);
    list.appendChild(d);
  });
}

function filterRef(q){renderRef(q);}

function insertFn(fn){
  const inp=document.getElementById('formulaInput');
  const pos=inp.selectionStart;
  const v=inp.value;
  if(!v||v===''){inp.value='='+fn+'(';inp.setSelectionRange(fn.length+2,fn.length+2);}
  else{const ins=fn+'(';inp.value=v.slice(0,pos)+ins+v.slice(pos);inp.setSelectionRange(pos+ins.length,pos+ins.length);}
  inp.focus();
}

// ─────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────
let cur=-1, flt='today';
const dn=new Set(), rp=new Set();
let _dailyCache=null, AA=false;

// ─────────────────────────────────────────────────────────────────
// SPREADSHEET ENGINE
// ─────────────────────────────────────────────────────────────────
let sheetData=[];  // 2D array of {val,formula,cls}
let selRow=-1, selCol=-1;
let targetRow=-1, targetCol=-1;

function buildSheet(task){
  const g=task.grid;
  const nCols=g.cols.length;
  const nRows=g.rows.length;
  sheetData=g.rows.map((r,ri)=>
    g.cols.map((_,ci)=>({
      val: r[ci]!==undefined?String(r[ci]):'',
      formula:'',
      isHeader: ri===0,
      isNum: typeof r[ci]==='number'
    }))
  );
  targetRow=task.target.row;
  targetCol=task.target.col;
  renderSheet(g.cols,nRows);
  selectCell(task.target.row, task.target.col);
}

function renderSheet(cols,nRows){
  const table=document.getElementById('sheet');
  let html='<thead><tr><th class="col-hdr" style="width:28px"></th>';
  cols.forEach(c=>html+=`<th class="col-hdr">${c}</th>`);
  html+='</tr></thead><tbody>';
  sheetData.forEach((row,ri)=>{
    html+=`<tr><td class="row-hdr">${ri+1}</td>`;
    row.forEach((cell,ci)=>{
      let cls='cell';
      if(cell.isHeader) cls+=' header-cell';
      else if(cell.isNum) cls+=' num';
      // Mark ALL non-header cells in the target column that are empty as answer cells
      const isAnswerCol = ci===targetCol && ri>0 && !cell.isHeader && cell.val==='';
      if(isAnswerCol) cls+=' answer-cell';
      html+=`<td class="${cls}" id="c${ri}_${ci}" onclick="selectCell(${ri},${ci})">${escH(cell.val)}</td>`;
    });
    html+='</tr>';
  });
  html+='</tbody>';
  table.innerHTML=html;
  // Auto-select the target cell after render
  setTimeout(()=>{
    const targetEl=document.getElementById(`c${targetRow}_${targetCol}`);
    if(targetEl) targetEl.scrollIntoView({block:'nearest',behavior:'smooth'});
  },50);
}

function selectCell(r,c){
  document.querySelectorAll('.cell.sel').forEach(el=>el.classList.remove('sel'));
  selRow=r;selCol=c;
  const el=document.getElementById(`c${r}_${c}`);
  if(el){
    el.classList.add('sel');
    document.getElementById('cellRef').textContent=colLetter(c)+(r+1);
  }
  const inp=document.getElementById('formulaInput');
  // Show existing formula if cell was filled, otherwise empty for answer cells
  const cell = sheetData[r] && sheetData[r][c];
  if(cell){
    inp.value = cell.formula || (cell.isHeader || (cell.val && !cell.formula) ? cell.val : '');
    // For answer cells (empty initially), start fresh
    const isAnswer = !cell.isHeader && cell.val==='' && !cell.formula;
    if(isAnswer) inp.value = '';
  }
  // Always focus formula bar when selecting any non-header cell
  if(r > 0 || !sheetData[r][c].isHeader) inp.focus();
}

function colLetter(c){return String.fromCharCode(65+c);}

function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ─────────────────────────────────────────────────────────────────
// ANSWER CHECKING
// ─────────────────────────────────────────────────────────────────
function checkAnswer(){
  if(cur<0)return;
  const task=T[cur];
  const formula=document.getElementById('formulaInput').value.trim();
  if(!formula){showToast('Wpisz formułę w polu formuły','warn');return;}

  // Use CURRENTLY SELECTED cell, not fixed target
  const activeRow = (selRow >= 0) ? selRow : targetRow;
  const activeCol = (selCol >= 0) ? selCol : targetCol;

  // Store formula and value in the active cell
  sheetData[activeRow][activeCol].formula = formula;
  const result = evalFormula(formula, sheetData);
  sheetData[activeRow][activeCol].val = (result !== null && result !== undefined) ? String(result) : '';

  const el = document.getElementById(`c${activeRow}_${activeCol}`);
  if(el){
    el.textContent = (result !== null && result !== undefined) ? String(result) : '#BŁĄD!';
    el.classList.remove('correct','wrong');
  }

  // Check: evaluate checkFn against target cell
  const isTargetCell = (activeRow === targetRow && activeCol === targetCol);
  const checkVal = isTargetCell ? result : (() => {
    const tf = sheetData[targetRow][targetCol].formula;
    return tf ? evalFormula(tf, sheetData) : sheetData[targetRow][targetCol].val;
  })();

  let correct = false;
  try{ correct = task.checkFn(checkVal, sheetData); }catch(e){}

  // Highlight the active cell
  if(el){
    void el.offsetWidth;
    el.classList.add(correct ? 'correct' : 'wrong');
  }

  // Also highlight target cell if it's different and was already filled
  if(!isTargetCell){
    const tEl = document.getElementById(`c${targetRow}_${targetCol}`);
    const tf = sheetData[targetRow][targetCol].formula;
    if(tEl && tf){
      const tv = evalFormula(tf, sheetData);
      tEl.textContent = (tv !== null && tv !== undefined) ? String(tv) : '';
      tEl.classList.remove('correct','wrong');
      if(correct) tEl.classList.add('correct');
    }
  }

  if(correct){
    showToast('✓ Poprawnie! Brawo!','ok');
    showKnowNope(true);
  } else {
    showToast('✗ Nie do końca… Spróbuj jeszcze raz lub sprawdź odpowiedź.','err');
  }
}

// ─────────────────────────────────────────────────────────────────
// SIMPLE FORMULA EVALUATOR
// ─────────────────────────────────────────────────────────────────
function evalFormula(formula, grid){
  if(!formula||!formula.startsWith('=')) return formula;
  const expr=formula.slice(1).trim();

  try{
    // Resolve cell references first (A2, B3, $A$2 etc.)
    const resolved=resolveRefs(expr,grid);
    return evalExpr(resolved);
  }catch(e){
    return '#BŁĄD!';
  }
}

function getCellVal(col,row,grid){
  const ri=row-1,ci=col.charCodeAt(0)-65;
  if(ri<0||ri>=grid.length||ci<0||ci>=grid[0].length) return '';
  const v=grid[ri][ci].val;
  if(v===''||v===undefined) return '';
  const n=Number(v);
  return isNaN(n)?v:n;
}

function getRangeVals(c1,r1,c2,r2,grid){
  const vals=[];
  for(let r=r1;r<=r2;r++){
    for(let c=c1;c<=c2;c++){
      const ci=c-65,ri=r-1;
      if(ri>=0&&ri<grid.length&&ci>=0&&ci<grid[0].length){
        const v=grid[ri][ci].val;
        if(v!==''){const n=Number(v);vals.push(isNaN(n)?v:n);}
      }
    }
  }
  return vals;
}

function resolveRefs(expr,grid){
  // Remove $ signs
  return expr.replace(/\$?([A-Z])\$?(\d+)/g,(m,col,rowS)=>{
    const v=getCellVal(col,parseInt(rowS),grid);
    if(typeof v==='string') return `"${v}"`;
    return String(v);
  });
}

function evalExpr(expr){
  // Function dispatching
  const fns={
    'JEŻELI': (args)=>{const[c,t,f]=args;return c?t:f;},
    'IF': (args)=>{const[c,t,f]=args;return c?t:f;},
    'JEŻELI.BŁĄD':(args)=>{try{return args[0]}catch(e){return args[1];}},
    'IFERROR':(args)=>{const[v,e]=args;return (v==null||String(v).startsWith('#'))?e:v;},
    'ORAZ':(args)=>args.every(Boolean),
    'AND':(args)=>args.every(Boolean),
    'LUB':(args)=>args.some(Boolean),
    'OR':(args)=>args.some(Boolean),
    'NIE':(args)=>!args[0],
    'NOT':(args)=>!args[0],
    'SUMA':(args)=>args.flat().reduce((a,b)=>a+(Number(b)||0),0),
    'SUM':(args)=>args.flat().reduce((a,b)=>a+(Number(b)||0),0),
    'MAX':(args)=>Math.max(...args.flat().map(Number)),
    'MIN':(args)=>Math.min(...args.flat().map(Number)),
    'ŚREDNIA':(args)=>{const a=args.flat().filter(v=>!isNaN(Number(v)));return a.length?a.reduce((s,v)=>s+Number(v),0)/a.length:0;},
    'AVERAGE':(args)=>{const a=args.flat().filter(v=>!isNaN(Number(v)));return a.length?a.reduce((s,v)=>s+Number(v),0)/a.length:0;},
    'MEDIANA':(args)=>{const a=args.flat().map(Number).sort((x,y)=>x-y);const m=Math.floor(a.length/2);return a.length%2?a[m]:(a[m-1]+a[m])/2;},
    'DŁ':(args)=>String(args[0]).length,
    'LEN':(args)=>String(args[0]).length,
    'LEWY':(args)=>String(args[0]).slice(0,Number(args[1])||1),
    'LEFT':(args)=>String(args[0]).slice(0,Number(args[1])||1),
    'PRAWY':(args)=>{const s=String(args[0]);return s.slice(s.length-(Number(args[1])||1));},
    'RIGHT':(args)=>{const s=String(args[0]);return s.slice(s.length-(Number(args[1])||1));},
    'ZAOKR':(args)=>Math.round(Number(args[0])*Math.pow(10,Number(args[1])||0))/Math.pow(10,Number(args[1])||0),
    'ROUND':(args)=>Math.round(Number(args[0])*Math.pow(10,Number(args[1])||0))/Math.pow(10,Number(args[1])||0),
    'MOD':(args)=>Number(args[0])%Number(args[1]),
    'BEZWZGL':(args)=>Math.abs(Number(args[0])),
    'ABS':(args)=>Math.abs(Number(args[0])),
    'ROK':(args)=>{const d=new Date(args[0]);return isNaN(d)?'#BŁĄD!':d.getFullYear();},
    'YEAR':(args)=>{const d=new Date(args[0]);return isNaN(d)?'#BŁĄD!':d.getFullYear();},
    'MIESIĄC':(args)=>{const d=new Date(args[0]);return isNaN(d)?'#BŁĄD!':d.getMonth()+1;},
    'MONTH':(args)=>{const d=new Date(args[0]);return isNaN(d)?'#BŁĄD!':d.getMonth()+1;},
    'DZIEŃ':(args)=>{const d=new Date(args[0]);return isNaN(d)?'#BŁĄD!':d.getDate();},
    'DAY':(args)=>{const d=new Date(args[0]);return isNaN(d)?'#BŁĄD!':d.getDate();},
    'ILE.LICZB':(args)=>args.flat().filter(v=>!isNaN(Number(v))&&v!=='').length,
    'COUNT':(args)=>args.flat().filter(v=>!isNaN(Number(v))&&v!=='').length,
    'ILE.NIEPUSTYCH':(args)=>args.flat().filter(v=>v!=='').length,
    'COUNTA':(args)=>args.flat().filter(v=>v!=='').length,
    'LICZ.PUSTE':(args)=>args.flat().filter(v=>v==='').length,
    'COUNTBLANK':(args)=>args.flat().filter(v=>v==='').length,
    'TEKST':(args)=>{
      // simplified: just return the value with 2dp if format has comma
      const v=Number(args[0]),fmt=String(args[1]);
      if(fmt.includes(',')){ return v.toFixed(fmt.replace(/[^0]/g,'').replace(/.*,/,'').length); }
      return String(v);
    },
    'TEXT':(args)=>String(args[0]),
    'ZŁĄCZ.TEKST':(args)=>{const sep=args[0];return args.slice(1).join(sep);},
    'TEXTJOIN':(args)=>{const sep=args[0];return args.slice(2).join(sep);},
    'PODSTAW':(args)=>String(args[0]).replace(new RegExp(args[1],'g'),args[2]||''),
    'SUBSTITUTE':(args)=>String(args[0]).replace(new RegExp(args[1],'g'),args[2]||''),
    'LITERY.WIELKIE':(args)=>String(args[0]).toUpperCase(),
    'UPPER':(args)=>String(args[0]).toUpperCase(),
    'LITERY.MAŁE':(args)=>String(args[0]).toLowerCase(),
    'LOWER':(args)=>String(args[0]).toLowerCase(),
    'INDEKS':(args)=>{const arr=args[0];const r=Number(args[1])-1;return Array.isArray(arr)?arr[r]:args[r];},
    'INDEX':(args)=>{const arr=args[0];const r=Number(args[1])-1;return Array.isArray(arr)?arr[r]:null;},
  };

  // Try to evaluate as JS-compatible expression
  // Replace Polish semicolons with commas, handle function calls
  return evalPolish(expr,fns);
}

function evalPolish(expr,fns){
  // Polish function names mapping
  const aliases={
    'FAŁSZ':'false','PRAWDA':'true','FALSZ':'false',
  };
  let e=expr;
  for(const[k,v] of Object.entries(aliases)) e=e.replace(new RegExp(k,'gi'),v);

  // Replace function calls
  const fnNames=Object.keys(fns).join('|');
  const fnRe=new RegExp(`(${fnNames})\\(([^()]*(?:\\([^()]*\\)[^()]*)*)\\)`,'gi');

  let maxIter=20,prev='';
  while(e!==prev&&maxIter-->0){
    prev=e;
    e=e.replace(fnRe,(match,fn,argsStr)=>{
      const fnKey=fn.toUpperCase();
      if(!fns[fnKey]) return match;
      const args=splitArgs(argsStr).map(a=>coerce(a.trim()));
      try{const r=fns[fnKey](args);return typeof r==='string'?`"${r}"`:String(r);}
      catch(err){return '#BŁĄD!';}
    });
  }

  // Evaluate final arithmetic
  e=e.replace(/;/g,',');
  try{
    // Safe eval with limited scope
    const result=Function(`"use strict";return (${e})`)();
    return result;
  }catch(err){
    return e.replace(/"/g,'');
  }
}

function splitArgs(s){
  // Split by semicolons (Polish Excel) or commas, respecting nested parens/quotes
  const args=[],stack=[];let cur2='',inStr=false;
  for(let i=0;i<s.length;i++){
    const ch=s[i];
    if(ch==='"'){inStr=!inStr;cur2+=ch;continue;}
    if(inStr){cur2+=ch;continue;}
    if(ch==='('){stack.push(ch);cur2+=ch;}
    else if(ch===')'){stack.pop();cur2+=ch;}
    else if((ch===';'||ch===',')&&stack.length===0){args.push(cur2);cur2='';}
    else cur2+=ch;
  }
  if(cur2.trim()) args.push(cur2);
  return args;
}

function coerce(s){
  s=s.trim();
  if(s===''||s===undefined) return '';
  if(s==='"true"'||s==='true') return true;
  if(s==='"false"'||s==='false'||s==='"FAŁSZ"'||s==='FAŁSZ') return false;
  if(s.startsWith('"')&&s.endsWith('"')) return s.slice(1,-1);
  const n=Number(s);
  if(!isNaN(n)&&s!=='') return n;
  return s;
}

// Evaluate range notation A2:B6 in formula input area
function resolveRangeInInput(expr,grid){
  return expr.replace(/\$?([A-Z])\$?(\d+):\$?([A-Z])\$?(\d+)/g,(m,c1,r1,c2,r2)=>{
    const vals=getRangeVals(c1.charCodeAt(0),parseInt(r1),c2.charCodeAt(0),parseInt(r2),grid);

    return JSON.stringify(vals);

}

function parseDate(v){
  if(!v) return null;
  const d=new Date(String(v));
  return isNaN(d)?null:d;
}

function matchCrit(arr,crit){
  const cs=String(crit);
  // Operators: >, <, >=, <=, <>, =
  const opMatch=cs.match(/^(>=|<=|<>|>|<|=)(.*)$/);
  if(opMatch){
    const op=opMatch[1],val=opMatch[2];
    const num=Number(val);
    return arr.filter(v=>{
      const n=Number(v);
      if(op==='>=') return !isNaN(n)&&n>=num;
      if(op==='<=') return !isNaN(n)&&n<=num;
      if(op==='>') return !isNaN(n)&&n>num;
      if(op==='<') return !isNaN(n)&&n<num;
      if(op==='<>') return String(v).toLowerCase()!==val.toLowerCase();
      if(op==='=') return String(v).toLowerCase()===val.toLowerCase();
    }).length;
  }
  // Wildcard * ?
  if(cs.includes('*')||cs.includes('?')){
    const re=new RegExp('^'+cs.replace(/\*/g,'.*').replace(/\?/g,'.')+'$','i');
    return arr.filter(v=>re.test(String(v))).length;
  }
  // Exact match (case insensitive)
  const num=Number(cs);
  return arr.filter(v=>{
    if(!isNaN(num)&&num!=='') return Number(v)===num;
    return String(v).toLowerCase()===cs.toLowerCase();
  }).length;
}

function vlookup(search,tbl,colIdx,isExact,grid){
  // tbl is a flat array representing the entire range – we need to know how many cols
  // We'll reconstruct from context: scan all grid rows for matching first col
  // Use grid directly for better accuracy
  const s=String(search);
  const sNum=Number(search);

  // Find range from sheetData – search entire grid for the lookup table
  // Best effort: scan grid rows for matching value in any column
  for(let r=0;r<grid.length;r++){
    const row=grid[r];
    if(!row.length) continue;
    const v=row[0].val;
    const vStr=String(v);
    const match=isExact
      ?(vStr.toLowerCase()===s.toLowerCase()||(!isNaN(sNum)&&Number(v)===sNum))
      :(!isNaN(sNum)&&Number(v)<=sNum);

    if(match&&!isExact){
      // Find last row where col[0] <= search
      let lastMatch=null;
      for(let rr=0;rr<grid.length;rr++){
        const vv=Number(grid[rr][0].val);
        if(!isNaN(vv)&&vv<=sNum) lastMatch=rr;
      }
      if(lastMatch!==null&&grid[lastMatch][colIdx]) return grid[lastMatch][colIdx].val;
    }
    if(isExact&&match){
      if(row[colIdx]) return isNaN(Number(row[colIdx].val))?row[colIdx].val:Number(row[colIdx].val);
    }
  }
  return '#N/D!';
}

  markDailyIfNeeded(cur);showProgressBar();refreshTodayBadge();refreshRepeatFilter();
  showKnowNope(false);
  showFeedback('✓ Umiem! Lecę dalej…','#16a34a');
  setTimeout(()=>{goNext();},700);
}
function markNope(){
  if(cur<0)return;
  rp.add(cur);dn.delete(cur);
  saveProgress();saveRepeat();
  showProgressBar();refreshTodayBadge();refreshRepeatFilter();
  showKnowNope(false);
  showFeedback('✗ Dodano do powtórki – wrócimy do tego!','#dc2626');
  setTimeout(()=>{goNext();},700);
}

function goNext(){
  const todayPlan=(_dailyCache&&_dailyCache.plan)||[];
  let nextIdx=-1;
  for(let i=cur+1;i<T.length;i++){
    if(flt==='today'&&!todayPlan.includes(i))continue;
    if(flt==='repeat'&&!rp.has(i))continue;
    if(!['all','today','repeat'].includes(flt)&&T[i].c!==flt)continue;
    nextIdx=i;break;
  }
  if(nextIdx>=0) sel(nextIdx);
  else renderList();
}

function refreshRepeatFilter(){
  const btn=document.getElementById('ftagrepeat')||document.querySelector('[id$="Repeat"]');
  if(btn) btn.textContent=`🔁 Powtórka (${rp.size})`;
}

function refreshTodayBadge(){
  const btn=document.getElementById('ftagToday');if(!btn)return;
  const plan=(_dailyCache&&_dailyCache.plan)||[];
  const done=(_dailyCache&&_dailyCache.doneInPlan&&_dailyCache.doneInPlan.size)||0;
  btn.textContent=`📅 Dziś (${done}/${plan.length||15})`;
}

function showFeedback(msg,color){
  let fb=document.getElementById('taskFeedback');
  fb.textContent=msg;
  fb.style.background=color+'22';
  fb.style.border='1px solid '+color+'66';
  fb.style.color=color;
  fb.style.opacity='1';
  clearTimeout(fb._t);
  fb._t=setTimeout(()=>{fb.style.opacity='0';},2000);
}

function showToast(msg,type){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.className='result-toast';document.body.appendChild(t);}
  t.textContent=msg;
  t.style.background=type==='ok'?'rgba(34,197,94,.15)':type==='err'?'rgba(239,68,68,.15)':'rgba(234,179,8,.15)';
  t.style.border=`1px solid ${type==='ok'?'#22c55e':type==='err'?'#ef4444':'#eab308'}44`;
  t.style.color=type==='ok'?'#4ade80':type==='err'?'#f87171':'#fbbf24';
  t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2500);
}

function saveProgress(){
  const data=JSON.stringify({done:[...dn],cur,date:new Date().toISOString().split('T')[0]});
  try{localStorage.setItem(STORAGE_KEY,data);}catch(e){}
}

function loadProgress(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);if(!raw)return;
    const data=JSON.parse(raw);
    if(data.done) data.done.forEach(i=>dn.add(parseInt(i)));
    if(typeof data.cur==='number'&&data.cur>=0) cur=data.cur;
    renderList();
    if(cur>=0) sel(cur);
    showProgressBar();
  }catch(e){}
}

function clearProgress(){
  try{localStorage.removeItem(STORAGE_KEY);}catch(e){}
  dn.clear();cur=-1;
  renderList();
  document.getElementById('tq').innerHTML='<h2>Wybierz <span>zadanie</span></h2><p>Postęp wyczyszczony. Zacznij od nowa!</p>';
  document.getElementById('sheet').innerHTML='';
  document.getElementById('formulaInput').value='';
  showProgressBar();
}

function showProgressBar(){
  const pct=T.length?Math.round(dn.size/T.length*100):0;
  let bar=document.getElementById('progBar');
  if(!bar){
    const nb=document.querySelector('.nav-r');
    const wrap=document.createElement('div');
    wrap.id='progBar';
    wrap.style.cssText='display:flex;align-items:center;gap:6px;font-size:.6rem;color:#6b7280';
    wrap.innerHTML=`<div style="width:80px;height:4px;background:#1e2228;border-radius:2px"><div id="progFill" style="height:100%;background:linear-gradient(90deg,#22c55e,#3b82f6);border-radius:2px;transition:width .3s"></div></div><span id="progPct">0%</span>`;
    nb.insertBefore(wrap,nb.firstChild);bar=wrap;
  }
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progPct').textContent=pct+'%';
}

// ─────────────────────────────────────────────────────────────────
// DAILY PLAN
// ─────────────────────────────────────────────────────────────────
const DAILY_PER_CAT=[2,2,2,1,1,1,2,2,2];

function seededShuffle(arr,seed){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    seed=(seed*1664525+1013904223)&0x7fffffff;
    const j=seed%(i+1);[a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function dateSeed(ds){return ds.split('-').reduce((a,b)=>a*100+parseInt(b),0);}

function buildDailyPlan(dateStr){
  const seed=dateSeed(dateStr);
  const plan=[];
  CATS.forEach((cat,ci)=>{
    const catIdxs=T.map((_,i)=>i).filter(i=>T[i].c===cat);
    const shuffled=seededShuffle(catIdxs,seed+ci*997);
    plan.push(...shuffled.slice(0,DAILY_PER_CAT[ci]||1));
  });
  return seededShuffle(plan,seed+12345);
}

function getDailyPlan(){
  return new Promise(res=>{
    const today=new Date().toISOString().split('T')[0];
    if(_dailyCache&&_dailyCache.date===today){res(_dailyCache);return;}
    let raw=null;
    try{raw=localStorage.getItem(DAILY_PLAN_KEY);}catch(e){}
    let obj=null;
    try{obj=JSON.parse(raw||'null');}catch(e){}
    if(obj&&obj.date===today){obj.doneInPlan=new Set(obj.doneInPlan||[]);_dailyCache=obj;res(obj);}
    else{
      const plan=buildDailyPlan(today);
      obj={date:today,plan,doneInPlan:new Set()};
      _dailyCache=obj;saveDailyPlan();res(obj);
    }
  });
}

function saveDailyPlan(){
  if(!_dailyCache)return;
  const toSave={..._dailyCache,doneInPlan:[..._dailyCache.doneInPlan]};
  try{localStorage.setItem(DAILY_PLAN_KEY,JSON.stringify(toSave));}catch(e){}
}

function markDailyIfNeeded(taskIdx){
  if(!_dailyCache)return;
  if(_dailyCache.plan.includes(taskIdx)){
    _dailyCache.doneInPlan.add(taskIdx);
    saveDailyPlan();updateDailyBadge();
  }
}

function updateDailyBadge(){
  if(!_dailyCache)return;
  const done=_dailyCache.doneInPlan.size,total=_dailyCache.plan.length;
  const btn=document.getElementById('btnDzisPlan');
  if(btn)btn.textContent=`📅 Dziś ${done}/${total}`;
}

function showDailyModal(){
  getDailyPlan().then(planObj=>{
    const{date,plan,doneInPlan}=planObj;
    const donePlan=doneInPlan.size,totalPlan=plan.length;
    const pctPlan=Math.round(donePlan/totalPlan*100)||0;
    const doneAll=dn.size,pctAll=Math.round(doneAll/T.length*100);
    const byCat={};
    CATS.forEach(c=>byCat[c]=[]);
    plan.forEach(i=>{if(T[i])byCat[T[i].c].push(i);});

    let rows='';
    CATS.forEach(cat=>{
      const catColor={
        'JEŻELI':'#3b82f6','LICZ.JEŻELI':'#ef4444','SUMA.JEŻELI':'#22c55e',
        'WYSZUKAJ.PIONOWO':'#a855f7','INDEKS':'#c084fc','PODAJ.POZYCJĘ':'#c084fc',
        'TEKST':'#f97316','STATYSTYKA':'#eab308','ZAAWANSOWANE':'#ec4899'
      }[cat]||'#6b7280';
      const items=byCat[cat];
      if(!items||!items.length)return;
      const catDone=items.filter(i=>doneInPlan.has(i)).length;
      rows+=`<div style="margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
          <span style="font-size:.65rem;font-weight:600;color:${catColor};min-width:120px">${cat}</span>
          <span style="font-size:.6rem;color:#6b7280">${catDone}/${items.length}</span>
          <div style="flex:1;height:3px;background:#1e2228;border-radius:2px">
            <div style="height:100%;background:${catColor};border-radius:2px;width:${items.length?Math.round(catDone/items.length*100):0}%;opacity:.7"></div>
          </div>
        </div>`;
      items.forEach(i=>{
        if(!T[i])return;
        const t=T[i];const done=doneInPlan.has(i);
        rows+=`<div style="display:flex;align-items:center;gap:8px;padding:5px 8px;margin-left:8px;background:${done?'rgba(34,197,94,.07)':'rgba(255,255,255,.03)'};border:1px solid ${done?'rgba(34,197,94,.2)':'rgba(255,255,255,.06)'};border-radius:5px;cursor:pointer;margin-bottom:2px" onclick="sel(${i});closeDailyModal()">
          <span style="font-size:.75rem;color:${done?'#4ade80':'#4b5563'}">${done?'✓':'○'}</span>
          <span style="font-size:.67rem;color:${done?'#6b7280':'#d1d5db'};flex:1;${done?'text-decoration:line-through':''}">${t.n}</span>
        </div>`;
      });
      rows+='</div>';
    });

    const html=`<div id="dailyModalOverlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.75);z-index:1000;display:flex;align-items:center;justify-content:center">
  <div style="background:#1a1d27;border:1px solid #2d3139;border-radius:14px;padding:20px 22px;max-width:480px;width:92%;max-height:85vh;display:flex;flex-direction:column">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div>
        <div style="font-size:.85rem;font-weight:700;color:#22c55e">📅 Plan na dziś</div>
        <div style="font-size:.6rem;color:#4b5563;margin-top:1px">${date} · zaliczone ${donePlan}/${totalPlan}</div>
      </div>
      <button onclick="closeDailyModal()" style="background:none;border:none;color:#6b7280;font-size:1.2rem;cursor:pointer">✕</button>
    </div>
    <div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;font-size:.6rem;color:#6b7280;margin-bottom:3px">
        <span>Dziś: ${pctPlan}%</span><span>Ogółem: ${doneAll}/${T.length} (${pctAll}%)</span>
      </div>
      <div style="height:7px;background:#111318;border-radius:4px;overflow:hidden">
        <div style="height:100%;background:linear-gradient(90deg,#22c55e,#3b82f6);border-radius:4px;width:${pctPlan}%;transition:width .4s"></div>
      </div>
    </div>
    <div style="overflow-y:auto;flex:1;padding-right:4px">${rows}</div>
    <div style="margin-top:12px;display:flex;gap:8px">
      <button onclick="startFirstUndone();closeDailyModal()" style="flex:2;padding:7px;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.35);border-radius:7px;color:#4ade80;font-size:.67rem;cursor:pointer;font-weight:600">▶ Zacznij od pierwszego niezaliczonego</button>
      <button onclick="clearProgress();closeDailyModal()" style="flex:1;padding:7px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:7px;color:#f87171;font-size:.62rem;cursor:pointer">🗑 Reset</button>
    </div>
  </div>
</div>`;
    document.body.insertAdjacentHTML('beforeend',html);
  });
}

function closeDailyModal(){const el=document.getElementById('dailyModalOverlay');if(el)el.remove();}

function startFirstUndone(){
  if(!_dailyCache)return;
  const first=_dailyCache.plan.find(i=>!_dailyCache.doneInPlan.has(i));
  if(first!==undefined) sel(first);
}

buildBtns();
buildFilters();

getDailyPlan().then(()=>{
  loadProgress();
  loadRepeat();
